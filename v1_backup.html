<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileFinder | Professional File Management</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <style type="text/tailwindcss">
        @layer base {
            body { 
                @apply bg-gray-50 text-gray-900 transition-colors duration-200 antialiased selection:bg-brand-500 selection:text-white; 
            }
            .dark body { 
                @apply bg-gray-950 text-gray-100; 
            }
        }
        @layer components {
            .card { 
                @apply bg-white border border-gray-200 rounded-2xl shadow-sm transition-all duration-300; 
            }
            .dark .card { 
                @apply bg-gray-900 border-gray-800 shadow-none; 
            }
            .input-field { 
                @apply w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder-gray-400 text-sm shadow-sm; 
            }
            .dark .input-field { 
                @apply bg-gray-800 border-gray-700 text-white focus:ring-brand-400 focus:border-brand-400 placeholder-gray-500; 
            }
            .select-field {
                @apply input-field appearance-none cursor-pointer;
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
                background-position: right 0.5rem center;
                background-repeat: no-repeat;
                background-size: 1.5em 1.5em;
                padding-right: 2.5rem;
            }
            .dark .select-field {
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            }
            .btn-primary { 
                @apply px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-sm font-medium transition-all duration-200 shadow-sm shadow-brand-500/30 flex items-center justify-center gap-2 active:scale-95 disabled:opacity-70 disabled:pointer-events-none; 
            }
            .btn-secondary { 
                @apply px-5 py-2.5 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 rounded-xl text-sm font-medium transition-all duration-200 shadow-sm flex items-center justify-center gap-2 active:scale-95 disabled:opacity-70 disabled:pointer-events-none; 
            }
            .dark .btn-secondary { 
                @apply bg-gray-800 hover:bg-gray-700 text-gray-200 border-gray-700 shadow-none; 
            }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-gray-300 rounded-full; }
        .dark ::-webkit-scrollbar-thumb { @apply bg-gray-700; }
        ::-webkit-scrollbar-thumb:hover { @apply bg-gray-400; }
        .dark ::-webkit-scrollbar-thumb:hover { @apply bg-gray-600; }
        
        .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- Top Navigation -->
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-4 flex justify-between items-center sticky top-0 z-30 transition-colors">
        <div class="flex items-center gap-3">
            <div class="bg-brand-600 text-white p-2 text-xl rounded-xl shadow-sm shadow-brand-500/20">
                <i class="ph ph-folders"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900 dark:text-white leading-none">FileFinder</h1>
                <p class="text-[10px] uppercase tracking-wider text-gray-500 font-semibold mt-1">Management System</p>
            </div>
        </div>
        <button id="themeToggle" class="p-2.5 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-all active:scale-90" aria-label="Toggle Theme">
            <i class="ph ph-moon text-xl" id="themeIcon"></i>
        </button>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 p-4 md:p-6 lg:p-8 max-w-[1400px] mx-auto w-full flex flex-col gap-6">
        
        <!-- Action Ribbon & Filters -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 bg-white dark:bg-gray-900 p-4 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm">
            
            <!-- Overall Total -->
            <div class="flex items-center gap-3 pr-4 lg:border-r border-gray-200 dark:border-gray-700">
                <div class="p-2 bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 rounded-lg">
                    <i class="ph ph-files text-xl"></i>
                </div>
                <div>
                    <h2 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Total Files</h2>
                    <p class="text-2xl font-bold font-mono tracking-tight text-gray-900 dark:text-white leading-none" id="statTotal">0</p>
                </div>
            </div>

            <!-- Search and Filters -->
            <div class="flex flex-1 flex-col md:flex-row gap-3 w-full">
                <!-- Search -->
                <div class="relative flex-1 group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="ph ph-magnifying-glass text-lg"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="Search by party name..." autocomplete="off" class="input-field pl-10 w-full bg-gray-50 dark:bg-gray-800 border-transparent focus:border-brand-500 focus:bg-white dark:focus:bg-gray-900 transition-all">
                    <button id="clearSearch" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                        <i class="ph-fill ph-x-circle text-lg"></i>
                    </button>
                </div>

                <!-- Color Filter -->
                <select id="colorFilter" class="select-field w-full md:w-36 lg:w-48 bg-gray-50 dark:bg-gray-800 border-transparent focus:border-brand-500 focus:bg-white dark:focus:bg-gray-900">
                    <option value="ALL">All Colors</option>
                    <!-- Populated dynamically -->
                </select>

                <!-- Sort Filter -->
                <select id="sortFilter" class="select-field w-full md:w-40 lg:w-48 bg-gray-50 dark:bg-gray-800 border-transparent focus:border-brand-500 focus:bg-white dark:focus:bg-gray-900">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A-Z (Name)</option>
                    <option value="za">Z-A (Name)</option>
                </select>
            </div>
            
            <!-- Actions -->
            <div class="flex gap-3 w-full lg:w-auto mt-2 lg:mt-0">
                <button onclick="exportCSV()" class="btn-secondary flex-1 lg:flex-none h-11" title="Export as CSV">
                    <i class="ph ph-download-simple text-lg"></i> <span class="hidden sm:inline">Export</span>
                </button>
                <button onclick="openModal('add')" class="btn-primary flex-1 lg:flex-none h-11">
                    <i class="ph ph-plus-circle text-lg"></i> Add File
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
            
            <!-- Data Table Section -->
            <div class="card lg:col-span-3 overflow-hidden flex flex-col min-h-[500px]">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead>
                            <tr class="bg-gray-50 dark:bg-gray-800/80 border-b border-gray-200 dark:border-gray-700 text-[11px] uppercase tracking-wider text-gray-500 dark:text-gray-400 font-semibold">
                                <th class="px-6 py-4">Party Information</th>
                                <th class="px-6 py-4">File Color Code</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 dark:divide-gray-800">
                            <!-- Dynamic Rows Injected via JS -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center px-4 w-full h-full flex-1">
                    <div class="w-20 h-20 bg-gray-50 dark:bg-gray-800 rounded-full flex items-center justify-center mb-4 border border-gray-100 dark:border-gray-700">
                        <i class="ph ph-folder-open text-4xl text-gray-300 dark:text-gray-600"></i>
                    </div>
                    <p class="text-lg font-bold text-gray-900 dark:text-gray-100">No party files found</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 max-w-sm mx-auto">Click 'Add File' to create a new physical record in your system.</p>
                </div>
            </div>

            <!-- Recent Activity Sidebar -->
            <div class="card p-0 flex flex-col sticky top-24">
                <div class="p-5 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between bg-gray-50/50 dark:bg-gray-800/30 rounded-t-2xl">
                    <h3 class="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wider flex items-center gap-2">
                        <i class="ph-fill ph-clock-counter-clockwise text-brand-500"></i> Recent Activity
                    </h3>
                </div>
                <div class="p-6">
                    <div class="relative border-l-2 border-gray-100 dark:border-gray-800 ml-2.5 space-y-7" id="recentActivityList">
                        <!-- Dynamic items -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modalBackdrop" class="fixed inset-0 bg-gray-900/60 dark:bg-gray-950/80 backdrop-blur-sm z-40 hidden transition-opacity opacity-0 duration-300"></div>
    
    <!-- Add/Edit Modal -->
    <div id="partyModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
        <div class="card w-full max-w-md scale-95 opacity-0 transition-all duration-300 shadow-2xl flex flex-col" id="modalContent">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center p-5 sm:p-6 border-b border-gray-100 dark:border-gray-800 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 p-2 rounded-xl" id="modalIconBg">
                        <i class="ph ph-folder-plus text-xl" id="modalIcon"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white" id="modalTitle">Add New File</h3>
                </div>
                <button type="button" onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-700 hover:bg-gray-100 dark:hover:text-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <i class="ph ph-x text-lg"></i>
                </button>
            </div>

            <!-- Modal Form -->
            <form id="partyForm" class="flex flex-col" autocomplete="off" onsubmit="event.preventDefault(); saveParty();">
                <div class="p-5 sm:p-6 space-y-5">
                    <input type="hidden" id="partyId">
                    
                    <!-- Party Name -->
                    <div class="space-y-1.5 border-b border-gray-100 dark:border-gray-800 pb-5">
                        <label for="partyName" class="block text-sm font-semibold text-gray-700 dark:text-gray-200">
                            Party Name <span class="text-red-500">*</span>
                        </label>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">Full name of the party.</p>
                        <div class="relative">
                            <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="partyName" autocomplete="off" required class="input-field pl-10" placeholder="e.g. John Doe / Acme Corp">
                        </div>
                    </div>

                    <!-- File Color Selector -->
                    <div class="space-y-1.5">
                        <label for="fileColorSelect" class="block text-sm font-semibold text-gray-700 dark:text-gray-200">
                            File Color <span class="text-red-500">*</span>
                        </label>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">Select the physical folder color assigned to this party.</p>
                        <div class="relative">
                            <i class="ph fill ph-palette absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                            <select id="fileColorSelect" required class="select-field pl-10 font-medium" onchange="handleColorSelection()">
                                <option value="" disabled selected hidden>Choose file color...</option>
                                <optgroup id="colorOptionsGroup" label="Existing Colors">
                                    <!-- Populated dynamically -->
                                </optgroup>
                                <option value="__NEW__" class="font-bold text-brand-600">+ Add Custom Color...</option>
                            </select>
                        </div>
                        
                        <!-- Custom Color Entry (Hidden by default) -->
                        <div id="customColorDiv" class="hidden mt-3 p-3 bg-gray-50 dark:bg-gray-800/80 rounded-xl border border-gray-200 dark:border-gray-700 space-y-3">
                            <div class="flex gap-2 items-center">
                                <input type="text" id="newColorName" placeholder="Color Name (e.g. Cyan)" autocomplete="off" class="input-field py-2 text-sm">
                                <input type="color" id="newColorHex" value="#06b6d4" class="h-10 w-12 rounded-lg cursor-pointer bg-transparent border-none p-0 flex-shrink-0">
                            </div>
                            <button type="button" onclick="saveCustomColor()" class="btn-secondary w-full py-2 text-xs">Confirm New Color</button>
                        </div>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="p-5 sm:p-6 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-100 dark:border-gray-800 flex flex-col-reverse sm:flex-row justify-end gap-3 rounded-b-2xl">
                    <button type="button" onclick="closeModal()" class="btn-secondary w-full sm:w-auto">Cancel</button>
                    <button type="submit" class="btn-primary w-full sm:w-auto" id="saveBtn">Save Record</button>
                </div>
            </form>
        </div>
    </div>


    <!-- Application Logic -->
    <script>
        /**
         * State Management
         */
        let parties = [];
        let fileColors = [
            { id: 'c_red', name: 'Red', hex: '#ef4444' },
            { id: 'c_blue', name: 'Blue', hex: '#3b82f6' },
            { id: 'c_green', name: 'Green', hex: '#22c55e' },
            { id: 'c_yellow', name: 'Yellow', hex: '#eab308' }
        ];

        let currentMode = 'add';

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearch');
        const sortFilter = document.getElementById('sortFilter');
        const colorFilter = document.getElementById('colorFilter');
        const emptyState = document.getElementById('emptyState');
        const tableBody = document.getElementById('tableBody');

        /**
         * Initialization and Persistence
         */
        function loadData() {
            // Load Parties
            const storedParties = localStorage.getItem('fileFinder_parties');
            if (storedParties) {
                try { parties = JSON.parse(storedParties); } catch (e) { parties = []; }
            }
            
            // Load Custom Colors
            const storedColors = localStorage.getItem('fileFinder_colors');
            if (storedColors) {
                try { fileColors = JSON.parse(storedColors); } catch (e) {}
            }

            setupTheme();
            hydrateColorSelectors();
            refreshUI();
        }

        function saveData() {
            localStorage.setItem('fileFinder_parties', JSON.stringify(parties));
            localStorage.setItem('fileFinder_colors', JSON.stringify(fileColors));
            hydrateColorSelectors(); // ensure dropdowns are always synced
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('statTotal').innerText = parties.length;
            renderTable();
            renderRecent();
        }

        /**
         * Color Selector Logic
         */
        function hydrateColorSelectors() {
            // Populate form dropdown
            const group = document.getElementById('colorOptionsGroup');
            group.innerHTML = '';
            
            // Populate filter dropdown
            const oldFilterVal = colorFilter.value;
            colorFilter.innerHTML = '<option value="ALL">All Colors</option>';

            fileColors.forEach(c => {
                // Formatting option inside form
                group.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                
                // Formatting filter
                colorFilter.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
            
            // Retain filter selection if possible
            if([...colorFilter.options].some(o => o.value === oldFilterVal)) {
                colorFilter.value = oldFilterVal;
            } else {
                colorFilter.value = 'ALL';
            }
        }

        function handleColorSelection() {
            const select = document.getElementById('fileColorSelect');
            const customDiv = document.getElementById('customColorDiv');
            
            if (select.value === '__NEW__') {
                customDiv.classList.remove('hidden');
                document.getElementById('newColorName').focus();
            } else {
                customDiv.classList.add('hidden');
            }
        }

        function saveCustomColor() {
            const nameEl = document.getElementById('newColorName');
            const hexEl = document.getElementById('newColorHex');
            const name = nameEl.value.trim();
            const hex = hexEl.value;

            if (!name) {
                alert("Please enter a name for the custom color.");
                return;
            }

            // Check if name already exists
            if (fileColors.some(c => c.name.toLowerCase() === name.toLowerCase())) {
                alert("A color with this name already exists!");
                return;
            }

            const newColor = {
                id: 'c_' + Date.now(),
                name: name,
                hex: hex
            };

            fileColors.push(newColor);
            hydrateColorSelectors();
            
            // Automatically select the new color
            document.getElementById('fileColorSelect').value = newColor.id;
            
            // Hide and clear custom div
            document.getElementById('customColorDiv').classList.add('hidden');
            nameEl.value = '';
            
            showToast('New file color added successfully!');
            // Save to storage
            localStorage.setItem('fileFinder_colors', JSON.stringify(fileColors));
        }

        function getColorById(colorId) {
            return fileColors.find(c => c.id === colorId) || { name: 'Unknown', hex: '#9ca3af' };
        }

        /**
         * Render Table Logic
         */
        function renderTable() {
            tableBody.innerHTML = '';
            
            const query = searchInput.value.toLowerCase().trim();
            const sortBy = sortFilter.value;
            const filterColorId = colorFilter.value;
            
            // 1. Filter
            let filtered = parties.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query);
                const matchesColor = filterColorId === 'ALL' || p.colorId === filterColorId;
                return matchesSearch && matchesColor;
            });

            // 2. Sort
            filtered.sort((a, b) => {
                if (sortBy === 'newest') return b.dateAdded - a.dateAdded;
                if (sortBy === 'oldest') return a.dateAdded - b.dateAdded;
                if (sortBy === 'az') return a.name.localeCompare(b.name);
                if (sortBy === 'za') return b.name.localeCompare(a.name);
                return 0;
            });

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                filtered.forEach(p => {
                    const colorData = getColorById(p.colorId);
                    
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50/80 dark:hover:bg-gray-800/50 transition-colors group cursor-default';
                    tr.innerHTML = `
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700 flex flex-shrink-0 items-center justify-center text-white shadow-sm group-hover:scale-105 transition-transform" style="background-color: ${colorData.hex};">
                                    <i class="ph ph-folder text-xl"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span class="font-bold text-gray-900 dark:text-white group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors text-base">${p.name}</span>
                                    <span class="text-[11px] text-gray-500 dark:text-gray-400 mt-0.5">Added: ${new Date(p.dateAdded).toLocaleDateString(undefined, {year: 'numeric', month: 'short', day: 'numeric'})}</span>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-medium bg-gray-50 dark:bg-gray-800/50 w-max px-3 py-1.5 rounded-lg border border-gray-100 dark:border-gray-800">
                                <span class="color-dot" style="background-color: ${colorData.hex};"></span>
                                ${colorData.name} File
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                                <button onclick="openModal('edit', '${p.id}')" class="p-2 text-gray-500 hover:text-brand-600 hover:bg-brand-50 dark:hover:bg-brand-500/10 dark:hover:text-brand-400 rounded-lg transition-colors border border-transparent hover:border-brand-200 dark:hover:border-brand-500/20 shadow-sm hover:shadow" title="Edit Record">
                                    <i class="ph ph-pencil-simple text-lg"></i>
                                </button>
                                <button onclick="deleteParty('${p.id}')" class="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-500/10 dark:hover:text-red-400 rounded-lg transition-colors border border-transparent hover:border-red-200 dark:hover:border-red-500/20 shadow-sm hover:shadow" title="Delete Record">
                                    <i class="ph ph-trash text-lg"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
        }

        /**
         * Recent Activity Sidebar
         */
        function renderRecent() {
            const list = document.getElementById('recentActivityList');
            list.innerHTML = '';
            
            // Sort by modified date descending, take top 5
            const recent = [...parties].sort((a,b) => b.dateAdded - a.dateAdded).slice(0, 5);
            
            if (recent.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-6 text-center">
                        <i class="ph ph-activity text-3xl text-gray-300 dark:text-gray-700 mb-2"></i>
                        <p class="text-xs text-gray-500">No recent activity.</p>
                    </div>`;
                return;
            }

            recent.forEach((p, index) => {
                const colorData = getColorById(p.colorId);
                
                const diffMs = Date.now() - p.dateAdded;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHrs = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHrs / 24);
                
                let timeStr = 'Just now';
                if (diffDays > 0) timeStr = `${diffDays}d ago`;
                else if (diffHrs > 0) timeStr = `${diffHrs}h ago`;
                else if (diffMins > 0) timeStr = `${diffMins}m ago`;

                const div = document.createElement('div');
                div.className = 'relative pl-6 group';
                div.style.animation = `fade-in 0.3s ease-out ${index * 0.1}s both`;
                
                div.innerHTML = `
                    <span class="absolute -left-[5px] top-1.5 w-2.5 h-2.5 rounded-full ring-[6px] ring-white dark:ring-gray-900 group-hover:scale-125 transition-transform" style="background-color: ${colorData.hex};"></span>
                    <div class="text-sm bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-800 p-3 rounded-xl shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-1 gap-2">
                            <span class="font-bold text-gray-900 dark:text-white truncate">${p.name}</span>
                            <span class="text-[10px] font-semibold text-gray-400 bg-gray-50 dark:bg-gray-900 px-2 py-0.5 rounded-md whitespace-nowrap">${timeStr}</span>
                        </div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1.5">
                            <i class="ph ph-folder text-lg" style="color:${colorData.hex};"></i> ${colorData.name} File
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        /**
         * Modal Logic
         */
        const modal = document.getElementById('partyModal');
        const backdrop = document.getElementById('modalBackdrop');
        const content = document.getElementById('modalContent');
        const form = document.getElementById('partyForm');

        function openModal(mode, id = null) {
            currentMode = mode;
            
            modal.classList.remove('hidden');
            backdrop.classList.remove('hidden');
            
            void modal.offsetWidth; // reflow
            
            backdrop.classList.add('opacity-100');
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');

            document.getElementById('customColorDiv').classList.add('hidden'); // ensure hidden
            
            const title = document.getElementById('modalTitle');
            const icon = document.getElementById('modalIcon');
            const iconBg = document.getElementById('modalIconBg');
            const btn = document.getElementById('saveBtn');

            if (mode === 'edit') {
                title.innerText = 'Edit Party File';
                icon.className = 'ph ph-pencil-simple text-xl';
                iconBg.className = 'bg-amber-50 dark:bg-amber-500/10 text-amber-600 dark:text-amber-400 p-2 rounded-xl';
                btn.innerHTML = 'Update Record';
                
                const party = parties.find(p => p.id === id);
                if (party) {
                    document.getElementById('partyId').value = party.id;
                    document.getElementById('partyName').value = party.name;
                    document.getElementById('fileColorSelect').value = party.colorId || '';
                }
            } else {
                title.innerText = 'Add New Party';
                icon.className = 'ph ph-folder-plus text-xl';
                iconBg.className = 'bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 p-2 rounded-xl';
                btn.innerHTML = 'Save Record';
                
                form.reset();
                document.getElementById('partyId').value = '';
            }
            
            setTimeout(() => {
                document.getElementById('partyName').focus();
            }, 100);
        }
        
        function closeModal() {
            backdrop.classList.remove('opacity-100');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
                backdrop.classList.add('hidden');
            }, 300);
        }

        /**
         * CRUD Operations
         */
        function saveParty() {
            // Check form validity
            const colorSelect = document.getElementById('fileColorSelect');
            if (colorSelect.value === '__NEW__') {
                alert("Please confirm your custom color before saving.");
                return;
            }

            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const id = document.getElementById('partyId').value || 'party_' + Date.now().toString(36);
            const name = document.getElementById('partyName').value.trim();
            const colorId = colorSelect.value;
            const now = Date.now();

            // Check duplicate Party Name Warning!
            const exists = parties.some(p => p.name.toLowerCase() === name.toLowerCase() && p.id !== id);
            if(exists) {
                if(!confirm(`Warning: A Party file named "${name}" already exists! Are you sure you want to add another one with the same name?`)) {
                    return; // user cancelled
                }
            }

            if (currentMode === 'add') {
                parties.unshift({ 
                    id, 
                    name, 
                    colorId,
                    dateAdded: now, 
                    dateModified: now 
                });
            } else {
                const idx = parties.findIndex(p => p.id === id);
                if (idx > -1) {
                    parties[idx].name = name;
                    parties[idx].colorId = colorId;
                    parties[idx].dateModified = now;
                }
            }
            
            saveData();
            closeModal();
            showToast(`Party successfully ${currentMode === 'add' ? 'added' : 'updated'}!`);
            
            if(currentMode === 'add') {
                searchInput.value = '';
                clearSearchBtn.classList.add('hidden');
                refreshUI();
            }
        }

        function deleteParty(id) {
            if (confirm('Are you absolutely sure you want to remove this party from the registry?\n\nThis action cannot be undone.')) {
                parties = parties.filter(p => p.id !== id);
                saveData();
                showToast('Record deleted entirely.');
            }
        }

        /**
         * Export to CSV
         */
        function exportCSV() {
            if (parties.length === 0) {
                alert("The database is currently empty. Nothing to export.");
                return;
            }
            
            const headers = ['Party ID', 'Party Name', 'File Color', 'Date Added'];
            const rows = parties.map(p => {
                const colorData = getColorById(p.colorId);
                return [
                    p.id, 
                    `"${p.name.replace(/"/g, '""')}"`, 
                    colorData.name, 
                    new Date(p.dateAdded).toLocaleString()
                ];
            });

            const csvContent = [
                headers.join(','),
                ...rows.map(e => e.join(','))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            const dateStr = new Date().toISOString().split('T')[0];
            link.setAttribute("href", url);
            link.setAttribute("download", `FileFinder_Parties_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('Export successful! Check your downloads.', 'success');
        }

        /**
         * Events for Filters & Search
         */
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value;
            renderTable();
            if(val.length > 0) clearSearchBtn.classList.remove('hidden');
            else clearSearchBtn.classList.add('hidden');
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.classList.add('hidden');
            renderTable();
            searchInput.focus();
        });

        sortFilter.addEventListener('change', renderTable);
        colorFilter.addEventListener('change', renderTable);

        /**
         * Theme Management
         */
        function setupTheme() {
            const htmlClass = document.documentElement.classList;
            const themeIcon = document.getElementById('themeIcon');
            
            const applyTheme = (isDark) => {
                if(isDark) {
                    htmlClass.add('dark');
                    themeIcon.classList.replace('ph-moon', 'ph-sun');
                    themeIcon.classList.add('text-amber-400');
                } else {
                    htmlClass.remove('dark');
                    themeIcon.classList.replace('ph-sun', 'ph-moon');
                    themeIcon.classList.remove('text-amber-400');
                }
            };

            if (localStorage.fileFinder_theme === 'dark' || (!('fileFinder_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                applyTheme(true);
            } else {
                applyTheme(false);
            }

            document.getElementById('themeToggle').addEventListener('click', () => {
                const isDark = !htmlClass.contains('dark');
                applyTheme(isDark);
                localStorage.fileFinder_theme = isDark ? 'dark' : 'light';
            });
        }

        /**
         * Toast Notification
         */
        function showToast(message, type="success") {
            document.querySelectorAll('.toast-alert').forEach(el => el.remove());

            const toast = document.createElement('div');
            toast.className = `toast-alert fixed bottom-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-xl border transform translate-y-20 opacity-0 transition-all duration-300 font-medium text-sm
            ${type === 'success' ? 'bg-gray-900 border-gray-800 text-white dark:bg-white dark:border-gray-100 dark:text-gray-900' : 'bg-red-600 border-red-700 text-white'}`;
            
            const icon = type === 'success' ? '<i class="ph-fill ph-check-circle text-green-400 dark:text-green-600 text-lg"></i>' : '<i class="ph-fill ph-warning-circle text-white text-lg"></i>';
            toast.innerHTML = `${icon} ${message}`;
            
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-y-20', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });

        backdrop.addEventListener('click', closeModal);

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fade-in {
                from { opacity: 0; transform: translateY(5px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // Boot Application
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
